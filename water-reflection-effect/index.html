<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>水中倒影代码动画</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="stage-shell" aria-label="水中倒影代码动画舞台">
      <canvas id="scene" aria-label="水中倒影动画画布"></canvas>

      <div class="controls" aria-label="播放控制">
        <button id="toggle" type="button" aria-label="暂停或播放动画">暂停</button>
        <button id="restart" type="button" aria-label="重新播放动画">重播</button>
      </div>
    </main>

    <noscript>请启用 JavaScript 观看水中倒影动画。</noscript>
    <script src="./script.js"></script>
  </body>
</html>
